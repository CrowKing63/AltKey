<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사용자 피드백 — AltKey</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⌨</text></svg>">

  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #21253a;
      --border: #2e334d;
      --accent: #2563eb;
      --accent-h: #3b7bff;
      --text: #e8ecf5;
      --text-muted: #8b93b8;
      --radius: 12px;
      --radius-sm: 8px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      min-height: 100vh;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 56px;
      background: rgba(15, 17, 23, 0.82);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.15s;
    }

    .nav-links a:hover {
      color: var(--text);
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 4rem 1.5rem;
    }

    .page-header {
      margin-bottom: 2.5rem;
    }

    .page-header h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 0.5rem;
    }

    .page-header p {
      color: var(--text-muted);
      font-size: 1rem;
    }

    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group:last-of-type {
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text);
    }

    label .optional {
      font-weight: 400;
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    input[type="email"],
    textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
      resize: vertical;
    }

    input[type="email"]:focus,
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
    }

    textarea {
      min-height: 180px;
    }

    input[type="email"]::placeholder,
    textarea::placeholder {
      color: var(--text-muted);
    }

    .btn-submit {
      width: 100%;
      padding: 0.85rem 1.5rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.15s;
    }

    .btn-submit:hover {
      background: var(--accent-h);
      transform: translateY(-1px);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .form-note {
      margin-top: 1.25rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      text-align: center;
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 2rem 1.5rem;
      text-align: center;
    }

    footer p {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    footer a {
      color: #60a5fa;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      .nav-links {
        display: none;
      }

      .container {
        padding: 2.5rem 1rem;
      }

      .form-card {
        padding: 1.5rem;
      }
    }
  </style>
</head>

<body>

  <nav>
    <a class="nav-logo" href="index.html">⌨ AltKey</a>
    <div class="nav-links">
      <a href="index.html">홈</a>
      <a href="index.html#features">기능</a>
      <a href="index.html#download">다운로드</a>
      <a href="feedback.html">피드백</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1>사용자 피드백</h1>
      <p>버그를 발견하거나 기능이 필요하시면 말씀해주세요.</p>
    </div>

    <div class="form-card">
      <form action="https://forminit.com/f/rqc5cwhzn1n" method="POST">
        <div class="form-group">
          <label for="email">이메일 주소 <span class="optional">(선택)</span></label>
          <input type="email" id="email" name="fi-sender-email" placeholder="replies@example.com" />
        </div>

        <div class="form-group">
          <label for="content">버그 또는 기능 제한 <span class="optional">(필수)</span></label>
          <textarea id="content" name="fi-text-content" placeholder="어떤 문제가 있었나요? 재현 방법과 함께 알려주시면 더 빠른 해결에 도움이 됩니다."
            required></textarea>
        </div>

        <button type="submit" class="btn-submit">접수</button>

        <p class="form-note">접수 후 자동으로 홈으로 이동합니다.</p>
      </form>
    </div>
  </div>

  <footer>
    <p><a href="index.html">AltKey</a> — Windows 화상 키보드</p>
  </footer>

</body>

</html>
