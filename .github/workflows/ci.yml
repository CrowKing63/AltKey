name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore AltKey/AltKey.csproj

      - name: Build
        run: dotnet build AltKey/AltKey.csproj -c Release --no-restore

      - name: Test
        run: dotnet test AltKey.Tests/AltKey.Tests.csproj -c Release --verbosity normal
