name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore AltKey/AltKey.csproj

      - name: Publish portable single-file
        run: >
          dotnet publish AltKey/AltKey.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishReadyToRun=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o dist/publish

      - name: Package portable ZIP
        run: >
          powershell -ExecutionPolicy Bypass
          -File scripts/package-portable.ps1
          -Version ${{ github.ref_name }}
          -BuildDir dist/publish

      # T-9.5: Inno Setup 인스톨러 빌드 (태그에서 버전 직접 치환: v0.1.5 → 0.1.5)
      - name: Build Installer (Inno Setup)
        run: |
          choco install innosetup --no-progress -y
          $env:PATH = [System.Environment]::GetEnvironmentVariable("PATH", "Machine") + ";" + $env:PATH
          $version = "${{ github.ref_name }}".TrimStart('v')
          # .iss 파일의 AppVersion 줄을 태그 버전으로 직접 치환
          (Get-Content installer/AltKey.iss) `
            -replace '#define AppVersion\s+"[^"]+"', "#define AppVersion `"$version`"" |
            Set-Content installer/AltKey.iss
          iscc installer/AltKey.iss
        shell: pwsh

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/AltKey-Portable-*.zip
            dist/AltKey-Setup-*.exe
          fail_on_unmatched_files: true
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
