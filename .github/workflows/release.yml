name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish portable single-file
        run: dotnet publish AltKey/AltKey.csproj -p:PublishProfile=portable -o dist/publish

      - name: Package portable ZIP
        run: powershell -ExecutionPolicy Bypass -File scripts/package-portable.ps1 -Version ${{ github.ref_name }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/altkey-portable-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
