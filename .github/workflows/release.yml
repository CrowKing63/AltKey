name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore AltKey/AltKey.csproj

      - name: Publish portable single-file
        run: >
          dotnet publish AltKey/AltKey.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishReadyToRun=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o dist/publish

      - name: Package portable ZIP
        run: >
          powershell -ExecutionPolicy Bypass
          -File scripts/package-portable.ps1
          -Version ${{ github.ref_name }}
          -BuildDir dist/publish

      # T-9.5: Inno Setup 인스톨러 빌드
      - name: Build Installer (Inno Setup)
        run: |
          choco install innosetup --no-progress -y
          iscc installer/AltKey.iss

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/altkey-portable-*.zip
            dist/AltKey-Setup-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
